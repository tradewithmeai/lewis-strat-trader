# lake.solvx.uk — HTTP-only, basic-auth in front of the crypto-lake API (:8000).
# `certbot --nginx` upgrades this to 443 + redirect after DNS points here.
# Requires /etc/nginx/.htpasswd_lake (restored from the bootstrap bundle, 640 root:www-data).
server {
    listen 80;
    listen [::]:80;
    server_name lake.solvx.uk;

    auth_basic           "Crypto Lake";
    auth_basic_user_file /etc/nginx/.htpasswd_lake;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
